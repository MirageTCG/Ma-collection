<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Collection Pokémon JP — ADV &amp; PCG</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #181818;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #f0ece4;
  --muted: #888;
  --muted2: #555;
  --gold: #c9a84c;
  --gold2: #e8c87a;
  --red: #c0392b;
  --green: #27ae60;
  --blue: #2980b9;
  --psa-blue: #1a4a8a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.6;
}

/* HEADER */
.site-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
.logo {
  font-family: 'Shippori Mincho', serif;
  font-size: 18px; font-weight: 600;
  color: var(--gold2);
  letter-spacing: 0.03em;
}
.logo span { color: var(--muted); font-size: 13px; font-family: 'Inter', sans-serif; font-weight: 300; margin-left: 10px; }
.header-nav { display: flex; gap: 6px; }
.nav-btn {
  padding: 5px 14px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.nav-btn:hover, .nav-btn.active { background: var(--gold); border-color: var(--gold); color: #111; }

/* HERO STATS */
.hero {
  padding: 3rem 2rem 2rem;
  border-bottom: 1px solid var(--border);
}
.hero-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 32px; font-weight: 500; color: var(--gold2);
  margin-bottom: 6px; letter-spacing: -0.5px;
}
.hero-sub { color: var(--muted); font-size: 13px; margin-bottom: 2rem; }
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}
.stat-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 16px;
}
.stat-card .num {
  font-size: 26px; font-weight: 500; color: var(--gold2);
  font-family: 'Shippori Mincho', serif;
}
.stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

/* TOOLBAR */
.toolbar {
  padding: 1rem 2rem; display: flex; gap: 10px; flex-wrap: wrap;
  align-items: center; border-bottom: 1px solid var(--border);
  background: var(--surface); position: sticky; top: 56px; z-index: 90;
}
.search-box {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 7px 12px; color: var(--text);
  font-size: 13px; outline: none; width: 200px;
  font-family: 'Inter', sans-serif;
}
.search-box::placeholder { color: var(--muted2); }
.search-box:focus { border-color: var(--gold); }
.filter-group { display: flex; gap: 4px; }
.chip {
  padding: 5px 12px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.chip:hover { border-color: var(--gold); color: var(--gold); }
.chip.on { background: var(--gold); border-color: var(--gold); color: #111; font-weight: 500; }
.sep { width: 1px; height: 28px; background: var(--border); align-self: center; }
.count-badge { font-size: 12px; color: var(--muted); margin-left: auto; }

/* MAIN LAYOUT */
.main { padding: 2rem; }

/* BLOC */
.bloc-section { margin-bottom: 3rem; }
.bloc-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 1.5rem; padding-bottom: 12px;
  border-bottom: 2px solid var(--gold);
}
.bloc-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 22px; font-weight: 600; color: var(--gold2);
  letter-spacing: -0.3px;
}
.bloc-jp { font-size: 13px; color: var(--muted); }
.bloc-pill {
  margin-left: auto; background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--gold); font-size: 11px; padding: 3px 10px;
  border-radius: 20px;
}

/* SERIE */
.serie-section { margin-bottom: 2rem; }
.serie-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.serie-name {
  font-size: 12px; font-weight: 500; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
  white-space: nowrap;
}
.serie-line { flex: 1; height: 1px; background: var(--border); }
.serie-count { font-size: 11px; color: var(--muted2); white-space: nowrap; }

/* CARD GRID */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
.poke-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  cursor: pointer; transition: all 0.2s;
  position: relative;
}
.poke-card:hover {
  border-color: var(--gold);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.poke-card.graded { border-color: rgba(201,168,76,0.3); }
.poke-card.no-data { opacity: 0.5; }

.card-img-wrap {
  width: 100%; aspect-ratio: 3/4;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.card-img-wrap img {
  width: 100%; height: 100%; object-fit: contain;
  transition: transform 0.3s;
}
.poke-card:hover .card-img-wrap img { transform: scale(1.04); }
.card-placeholder {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 6px; width: 100%; height: 100%;
}
.placeholder-icon {
  width: 40px; height: 40px;
  border: 1px dashed var(--muted2); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted2); font-size: 18px;
}
.placeholder-name {
  font-size: 11px; color: var(--muted2);
  text-align: center; padding: 0 8px;
}

.grade-badge {
  position: absolute; top: 8px; right: 8px;
  background: rgba(10,10,10,0.85);
  border: 1px solid var(--gold);
  color: var(--gold2); font-size: 11px; font-weight: 500;
  padding: 2px 7px; border-radius: 6px;
  backdrop-filter: blur(4px);
}

.card-body { padding: 10px 12px; }
.card-name-text {
  font-size: 13px; font-weight: 500; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 5px;
}
.card-meta { display: flex; gap: 5px; flex-wrap: wrap; }
.tag {
  font-size: 10px; padding: 2px 6px; border-radius: 4px;
  font-weight: 500; white-space: nowrap;
}
.tag-psa { background: rgba(26,74,138,0.3); color: #6fa8dc; border: 1px solid rgba(26,74,138,0.4); }
.tag-ed1 { background: rgba(192,57,43,0.2); color: #e07065; border: 1px solid rgba(192,57,43,0.3); }
.tag-edunl { background: rgba(39,174,96,0.15); color: #6dbb8a; border: 1px solid rgba(39,174,96,0.25); }
.tag-num { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }
.card-price {
  font-size: 12px; color: var(--gold); font-weight: 500;
  margin-top: 5px;
}

/* UPLOAD BTN */
.upload-btn {
  position: absolute; bottom: 8px; right: 8px;
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--muted); font-size: 13px; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  z-index: 2; transition: all 0.15s;
}
.poke-card:hover .upload-btn { display: flex; }
.upload-btn:hover { border-color: var(--gold); color: var(--gold); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 1rem; backdrop-filter: blur(4px);
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px; max-width: 420px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  padding: 1.5rem;
}
.modal-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
.modal-title { font-family: 'Shippori Mincho', serif; font-size: 20px; color: var(--gold2); }
.modal-close {
  background: none; border: none; color: var(--muted);
  font-size: 22px; cursor: pointer; line-height: 1;
}
.modal-img-wrap {
  width: 100%; border-radius: 10px; overflow: hidden;
  background: var(--surface2); margin-bottom: 1rem;
  display: flex; align-items: center; justify-content: center;
  min-height: 200px;
}
.modal-img-wrap img { width: 100%; max-height: 320px; object-fit: contain; }
.modal-no-img {
  width: 100%; height: 200px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 8px; cursor: pointer;
  border: 1px dashed var(--border2); border-radius: 10px;
  margin-bottom: 1rem; color: var(--muted); font-size: 13px;
  transition: border-color 0.15s;
}
.modal-no-img:hover { border-color: var(--gold); color: var(--gold); }
.modal-rows { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.modal-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 12px; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.modal-row:last-child { border-bottom: none; }
.modal-key { color: var(--muted); }
.modal-val { color: var(--text); font-weight: 500; }
.modal-psa-link {
  display: block; text-align: center; margin-top: 12px;
  padding: 8px; border-radius: 8px;
  background: rgba(26,74,138,0.2); border: 1px solid rgba(26,74,138,0.4);
  color: #6fa8dc; font-size: 12px; text-decoration: none;
  transition: background 0.15s;
}
.modal-psa-link:hover { background: rgba(26,74,138,0.35); }
.modal-upload-btn-wrap { margin-top: 10px; }
.modal-upload-btn {
  width: 100%; padding: 8px; border-radius: 8px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--muted); font-size: 12px; cursor: pointer;
  font-family: 'Inter', sans-serif; transition: all 0.15s;
}
.modal-upload-btn:hover { border-color: var(--gold); color: var(--gold); }

/* EMPTY */
.empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">ポケモン<span>Collection JP</span></div>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="scrollToBloc('ADV',this)">ADV</button>
    <button class="nav-btn" onclick="scrollToBloc('PCG',this)">PCG</button>
  </nav>
</header>

<section class="hero">
  <div class="hero-title">Ma Collection Pokémon Japonaise</div>
  <div class="hero-sub">ADV · PCG — Cartes gradées PSA · Edition 1 &amp; Unlimited</div>
  <div class="stats-grid" id="stats-grid"></div>
</section>

<div class="toolbar">
  <input type="text" class="search-box" id="search-box" placeholder="Rechercher une carte..." oninput="applyFilters()"/>
  <div class="filter-group">
    <button class="chip on" onclick="toggleChip(this,'bloc','all')">Tous</button>
    <button class="chip" onclick="toggleChip(this,'bloc','ADV')">ADV</button>
    <button class="chip" onclick="toggleChip(this,'bloc','PCG')">PCG</button>
  </div>
  <div class="sep"></div>
  <div class="filter-group">
    <button class="chip on" onclick="toggleChip(this,'edition','all')">Toutes éditions</button>
    <button class="chip" onclick="toggleChip(this,'edition','1')">1ère Éd.</button>
    <button class="chip" onclick="toggleChip(this,'edition','2')">Unlimited</button>
  </div>
  <div class="sep"></div>
  <div class="filter-group">
    <button class="chip on" onclick="toggleChip(this,'graded','all')">Toutes</button>
    <button class="chip" onclick="toggleChip(this,'graded','yes')">Gradées PSA</button>
  </div>
  <span class="count-badge" id="count-badge"></span>
</div>

<main class="main" id="main-content"></main>

<div id="modal-root" style="display:none"></div>
<input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImgUpload(event)"/>

const STORAGE_KEY = 'poke_collection_imgs_v1';
let imgStore = {};
let activeFilters = { bloc:'all', edition:'all', graded:'all' };
let uploadTargetIdx = null;

function loadImgs() {
  try { imgStore = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { imgStore = {}; }
}
function saveImgs() { localStorage.setItem(STORAGE_KEY, JSON.stringify(imgStore)); }

function cardKey(c) { return `${c.bloc}|${c.serie}|${c.carte}|${c.numero}|${c.edition}|${c.cert}`; }

function filteredData() {
  const q = document.getElementById('search-box').value.toLowerCase();
  return RAW.filter(c => {
    if (activeFilters.bloc !== 'all' && c.bloc !== activeFilters.bloc) return false;
    if (activeFilters.edition !== 'all' && String(c.edition) !== activeFilters.edition) return false;
    if (activeFilters.graded === 'yes' && !c.cert) return false;
    if (q && !c.carte.toLowerCase().includes(q) && !c.serie.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderStats() {
  const total = RAW.length;
  const graded = RAW.filter(c => c.cert).length;
  const valeur = RAW.reduce((a, c) => a + (c.prix_marche || 0), 0);
  const investi = RAW.reduce((a, c) => a + (c.prix_achat || 0), 0);
  const blocs = new Set(RAW.map(c => c.bloc)).size;
  const series = new Set(RAW.map(c => c.serie)).size;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Cartes totales</div></div>
    <div class="stat-card"><div class="num">${graded}</div><div class="lbl">Gradées PSA</div></div>
    <div class="stat-card"><div class="num">${blocs}</div><div class="lbl">Blocs</div></div>
    <div class="stat-card"><div class="num">${series}</div><div class="lbl">Séries</div></div>
    <div class="stat-card"><div class="num">${valeur.toLocaleString('fr-FR')} €</div><div class="lbl">Valeur marché</div></div>
    <div class="stat-card"><div class="num">${investi.toLocaleString('fr-FR', {maximumFractionDigits:0})} €</div><div class="lbl">Investi</div></div>
  `;
}

function toggleChip(btn, filterKey, val) {
  const group = btn.parentElement;
  group.querySelectorAll('.chip').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  activeFilters[filterKey] = val;
  renderMain();
}

function applyFilters() { renderMain(); }

function scrollToBloc(b, btn) {
  document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('bloc-' + b);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function edLabel(e) {
  if (e === 1) return '1ère Éd.';
  if (e === 2) return 'Unlimited';
  return null;
}

function renderMain() {
  const data = filteredData();
  document.getElementById('count-badge').textContent = `${data.length} carte${data.length > 1 ? 's' : ''}`;
  const main = document.getElementById('main-content');

  if (!data.length) {
    main.innerHTML = '<div class="empty">Aucune carte trouvée.</div>';
    return;
  }

  const byBloc = {};
  data.forEach(c => {
    if (!byBloc[c.bloc]) byBloc[c.bloc] = {};
    if (!byBloc[c.bloc][c.serie]) byBloc[c.bloc][c.serie] = [];
    byBloc[c.bloc][c.serie].push(c);
  });

  const BLOC_JP = { ADV: 'ADVシリーズ', PCG: 'PCGシリーズ' };
  let html = '';

  Object.keys(byBloc).forEach(bloc => {
    const total = Object.values(byBloc[bloc]).flat().length;
    html += `<div class="bloc-section" id="bloc-${bloc}">
      <div class="bloc-header">
        <div class="bloc-title">${bloc}</div>
        <div class="bloc-jp">${BLOC_JP[bloc] || ''}</div>
        <div class="bloc-pill">${total} cartes</div>
      </div>`;

    Object.keys(byBloc[bloc]).forEach(serie => {
      const cards = byBloc[bloc][serie];
      html += `<div class="serie-section">
        <div class="serie-header">
          <div class="serie-name">${serie}</div>
          <div class="serie-line"></div>
          <div class="serie-count">${cards.length}</div>
        </div>
        <div class="card-grid">`;

      cards.forEach((c, ci) => {
        const key = cardKey(c);
        const img = imgStore[key] || null;
        const rawIdx = RAW.indexOf(c);
        const isGraded = !!c.cert;
        const hasData = c.note || c.prix_marche || c.prix_achat;

        const imgHtml = img
          ? `<img src="${img}" alt="${c.carte}" />`
          : `<div class="card-placeholder">
              <div class="placeholder-icon">+</div>
              <div class="placeholder-name">${c.carte}</div>
             </div>`;

        const gradeBadge = c.note ? `<div class="grade-badge">PSA ${c.note}</div>` : '';
        const edL = edLabel(c.edition);
        const tags = [
          c.cert ? `<span class="tag tag-psa">PSA</span>` : '',
          edL === '1ère Éd.' ? `<span class="tag tag-ed1">1ère Éd.</span>` : '',
          edL === 'Unlimited' ? `<span class="tag tag-edunl">Unlimited</span>` : '',
          c.numero ? `<span class="tag tag-num">${c.numero}</span>` : ''
        ].filter(Boolean).join('');

        const priceHtml = c.prix_marche
          ? `<div class="card-price">${c.prix_marche.toLocaleString('fr-FR')} €</div>` : '';

        html += `<div class="poke-card${isGraded ? ' graded' : ''}${!hasData ? ' no-data' : ''}"
          onclick="openModal(${rawIdx})">
          <div class="card-img-wrap">
            ${imgHtml}
            ${gradeBadge}
          </div>
          <button class="upload-btn" onclick="event.stopPropagation();triggerUpload(${rawIdx})" title="Ajouter photo">↑</button>
          <div class="card-body">
            <div class="card-name-text">${c.carte}</div>
            <div class="card-meta">${tags}</div>
            ${priceHtml}
          </div>
        </div>`;
      });

      html += `</div></div>`;
    });
    html += `</div>`;
  });

  main.innerHTML = html;
}

function triggerUpload(idx) {
  uploadTargetIdx = idx;
  document.getElementById('img-input').click();
}

function handleImgUpload(e) {
  const file = e.target.files[0];
  if (!file || uploadTargetIdx === null) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const key = cardKey(RAW[uploadTargetIdx]);
    imgStore[key] = ev.target.result;
    saveImgs();
    renderMain();
    if (document.getElementById('modal-root').style.display !== 'none') {
      openModal(uploadTargetIdx);
    }
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function openModal(rawIdx) {
  const c = RAW[rawIdx];
  const key = cardKey(c);
  const img = imgStore[key];
  const edL = edLabel(c.edition);
  uploadTargetIdx = rawIdx;

  const imgSection = img
    ? `<div class="modal-img-wrap"><img src="${img}" alt="${c.carte}"/></div>`
    : `<div class="modal-no-img" onclick="document.getElementById('img-input').click()">
        <div style="font-size:22px">+</div>
        <div>Ajouter une photo</div>
       </div>`;

  const rows = [
    ['Série', c.serie],
    ['Numéro', c.numero || '—'],
    ['Bloc', c.bloc],
    ['Édition', edL || '—'],
    ['Note PSA', c.note ? `PSA ${c.note}` : '—'],
    ['N° Certification', c.cert || '—'],
    ['Prix d\'achat', c.prix_achat ? `${c.prix_achat} €` : '—'],
    ['Valeur marché', c.prix_marche ? `${c.prix_marche.toLocaleString('fr-FR')} €` : '—'],
    ['Bénéfice x', c.benefice ? `${c.benefice.toFixed(2)}×` : '—'],
    ['Date achat', c.date_achat || '—'],
  ].map(([k, v]) => `<div class="modal-row"><span class="modal-key">${k}</span><span class="modal-val">${v}</span></div>`).join('');

  const psaLink = c.psa_url
    ? `<a class="modal-psa-link" href="${c.psa_url}" target="_blank">Vérifier sur PSA Card →</a>` : '';

  const changePhotoBtn = img
    ? `<div class="modal-upload-btn-wrap"><button class="modal-upload-btn" onclick="document.getElementById('img-input').click()">Changer la photo</button></div>` : '';

  const root = document.getElementById('modal-root');
  root.style.display = 'block';
  root.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-top">
        <div class="modal-title">${c.carte}</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      ${imgSection}
      <div class="modal-rows">${rows}</div>
      ${psaLink}
      ${changePhotoBtn}
    </div>
  </div>`;
}

function closeModal() {
  document.getElementById('modal-root').style.display = 'none';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadImgs();
renderStats();
renderMain();
</script>
</body>
</html>
